services:

  glpi_prod:
    
    container_name: glpi-prod-server

    hostname: glpi

    image: glpi/glpi:latest

    depends_on:
      - mysql_prod

    ports:
      - "80:80"
    
    volumes:

      - http_glpi:/etc/wwww/glpi/

    networks:
    
      - "glpi"



  mysql_prod:
    
    container_name: mysql-prod-server

    hostname: dbserver
    
    image: mysql:latest

    volumes:
      - mysql_glpi:/var/lib/mysql

    networks:
    
      - "glpi"
    

    environment:

      MYSQL_ROOT_PASSWORD: 123456 # senha inicial trocar posteriormente
      MYSQL_DATABASE: glpi
      MYSQL_USER: glpi
      MYSQL_PASSWORD: 123456 # senha inicial trocar posteriormente
    

  

  phpmyadmin:
    
    container_name: phpmyadmin-prod
    
    hostname: phpmyadmin

    image: phpmyadmin

    environment:

      PMA_HOST: mysql-prod-server
      PMA_USER: glpi
      PMA_PASSWORD: 123456


    ports:
      - "8080:80"


    networks:
    
      - "glpi"

    depends_on:
      - mysql_prod
  



